version: 0.2
env:
  variables:
    DB_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:338394180895:secret:/redshift/serverless/jdbc-Iqe1pU"
    LB_CHANGELOG: "db/liquibase/changelog/redshift/db.changelog-master.yaml"
    DEFAULT_SCHEMA: "cc_system"
    LB_SCHEMA: "cc_system"
phases:
  pre_build:
    commands:
      - set -euo pipefail
      - SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$DB_SECRET_ARN" --query SecretString --output text)
      - export DB_HOST=$(echo "$SECRET_JSON" | jq -r .host)
      - export DB_PORT=$(echo "$SECRET_JSON" | jq -r .port)
      - export DB_NAME=$(echo "$SECRET_JSON" | jq -r .database)
      - export DB_USER=$(echo "$SECRET_JSON" | jq -r .username)
      - export DB_PASSWORD=$(echo "$SECRET_JSON" | jq -r .password)
      - export LB_URL="jdbc:redshift://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=${DEFAULT_SCHEMA}"
      - |
        cat > liquibase.properties <<EOF
        changeLogFile=${LB_CHANGELOG}
        url=${LB_URL}
        username=${DB_USER}
        password=${DB_PASSWORD}
        driver=com.amazon.redshift.jdbc.Driver
        classpath=/opt/drivers/redshift.jar
        databaseChangeLogTableName=databasechangelog
        databaseChangeLogLockTableName=databasechangeloglock
        defaultSchemaName=${DEFAULT_SCHEMA}
        liquibaseSchemaName=${LB_SCHEMA}
        EOF
  build:
    commands:
      - liquibase --classpath=/opt/drivers/redshift.jar --defaultsFile=liquibase.properties update
