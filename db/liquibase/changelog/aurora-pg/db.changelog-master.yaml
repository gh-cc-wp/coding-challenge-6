databaseChangeLog:
  - changeSet:
      id: 001-create-postgres-tbls
      author: Sekhar
      changes:
        - sqlFile:
            path: db/liquibase/changelog/aurora-pg/cc_system_ddl.sql
            relativeToChangelogFile: false
            splitStatements: true
