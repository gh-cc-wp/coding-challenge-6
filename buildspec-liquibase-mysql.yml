version: 0.2
env:
  variables:
    DB_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:338394180895:secret:AuroraMySqlSecret4342E26D-aCun9Uq1yxxx-g0t7LJ"
    LB_CHANGELOG: "db/liquibase/changelog/aurora-mysql/db.changelog-master.yaml"

phases:
  pre_build:
    commands:
      - set -euo pipefail
      - SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$DB_SECRET_ARN" --query SecretString --output text)
      - DB_HOST=$(echo "$SECRET_JSON" | jq -r .host); DB_PORT=$(echo "$SECRET_JSON" | jq -r .port)
      - DB_NAME=$(echo "$SECRET_JSON" | jq -r '.dbname // "mysqldb"'); DB_USER=$(echo "$SECRET_JSON" | jq -r .username); DB_PASSWORD=$(echo "$SECRET_JSON" | jq -r .password)
      - LB_URL="jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      - |
        cat > liquibase.properties <<EOF
        changeLogFile=${LB_CHANGELOG}
        url=${LB_URL}
        username=${DB_USER}
        password=${DB_PASSWORD}
        driver=com.mysql.cj.jdbc.Driver
        classpath=/opt/drivers/mysql.jar
        EOF
  build:
    commands:
      - liquibase --classpath=/opt/drivers/mysql.jar --defaultsFile=liquibase.properties update
